volumes:
  pg_data:
  static:
  media:

services:
  db:
    image: postgres:13.10
    env_file: .env
    volumes:
      - pg_data:/var/lib/postgresql/data

  backend:
    image: ivanmalyshevv/kittygram_backend
    env_file: .env
    volumes:
      - static:/backend_static
      - media:/media

  frontend:
    image: ivanmalyshevv/kittygram_frontend
    command: cp -r /app/build/. /frontend_static/
    volumes:
      - static:/frontend_static

  gateway:
    image: ivanmalyshevv/kittygram_gateway
    ports:
      - "9000:80"
    volumes:
      - static:/staticfiles
      - media:/mediafiles